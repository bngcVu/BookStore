server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: BookStore

  # MySQL Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
    hikari:
      pool-name: BookStoreHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
        use_sql_comments: true
    open-in-view: false
    naming:
      physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  # Jackson JSON Configuration
  jackson:
    date-format: ${SPRING_JACKSON_DATE_FORMAT}
    time-zone: ${SPRING_JACKSON_TIME_ZONE}
    serialization:
      "write-dates-as-timestamps": false

  # Disable Flyway migrations
  flyway:
    enabled: false

  data:
    redis:
      repositories:
        enabled: false

  # --- Cấu hình Brevo Mail ---
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: true # Bắt buộc dùng TLS để bảo mật thông tin khách hàng

security:
  jwt:
    issuer: ${SECURITY_JWT_ISSUER}
    audience: ${SECURITY_JWT_AUDIENCE}
    private-key-base64: ${SECURITY_JWT_PRIVATE_KEY_BASE64}
    public-key-base64: ${SECURITY_JWT_PUBLIC_KEY_BASE64}
    access-token-exp-min: ${SECURITY_JWT_ACCESS_TOKEN_EXP_MIN}
    refresh-token-exp-days: ${SECURITY_JWT_REFRESH_TOKEN_EXP_DAYS}

app:
  # --- Cấu hình riêng cho Email & OTP của Cửa hàng sách ---
  mail:
    from: ${APP_MAIL_FROM:buingocvu.study@gmail.com}
  otp:
    send-email: ${APP_OTP_SEND_EMAIL:false}
    ttl-minutes: ${APP_OTP_TTL_MINUTES}
    fixed-code: ${APP_OTP_FIXED_CODE}

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    "com.bookstore": ${LOGGING_LEVEL_COM_BOOKSTORE:DEBUG}
    "org.hibernate.SQL": ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:DEBUG}
    "org.hibernate.type.descriptor.sql.BasicBinder": ${LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER:TRACE}